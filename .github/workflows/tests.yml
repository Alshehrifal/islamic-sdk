name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests (offline)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install hijridate

      - name: Run unit tests
        run: python run_tests.py

      - name: Show summary
        run: echo "✅ All unit tests passed on Python ${{ matrix.python-version }}"

  integration-tests:
    name: Integration Tests (live API)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: unit-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install hijridate

      - name: Run integration tests
        env:
          ISLAMIC_INTEGRATION_TESTS: "1"
        run: python run_tests.py --integration

  validate-skills:
    name: Validate SKILL.md files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check all skills have SKILL.md
        run: |
          SKILLS=(
            "islamic-prayer-times"
            "islamic-day-info"
            "islamic-qiyam"
            "islamic-hijri"
            "islamic-hilal"
            "islamic-eid"
            "islamic-arafah"
            "islamic-ashura"
            "islamic-next-events"
            "islamic-news"
            "shared"
          )
          for skill in "${SKILLS[@]}"; do
            if [ ! -f "$skill/SKILL.md" ]; then
              echo "❌ Missing SKILL.md in $skill"
              exit 1
            fi
            echo "✅ $skill/SKILL.md"
          done
